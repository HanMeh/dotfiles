# #######################################################################################
# MINIMAL HYPRLAND CONFIGURATION
# #######################################################################################

# --- Monitor Setup ---
# Automatically detects resolution and refresh rate
monitor=,preferred,auto,1

# --- Autostart Applications ---
# Launches your status bar, notification engine, and wallpaper backend on login
exec-once = waybar
exec-once = mako
exec-once = swww-daemon

# --- Input Configuration ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

# --- Visual Styling ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# --- Window Decorations ---
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- Layout Options ---
dwindle {
    pseudotile = true
    preserve_split = true
}

# --- Core Keyboard Shortcuts (Keybinds) ---
$mainMod = SUPER # Sets the "Windows/Command" key as the main modifier

# Core system triggers
bind = $mainMod, Q, exec, kitty                # Opens the terminal
bind = $mainMod, C, killactive,                # Closes the active window
bind = $mainMod, M, exit,                      # Logs out of Hyprland
bind = $mainMod, E, exec, dolphin             # Opens the file manager (change to nautilus if needed)
bind = $mainMod, V, togglefloating,            # Toggles floating mode on a window
bind = $mainMod, R, exec, rofi -show drun      # Opens the application launcher
bind = $mainMod, P, pseudo,                    # Dwindle layout pseudotile
bind = $mainMod, J, togglesplit,               # Dwindle layout split toggle

# Move window focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5



# --- Hardware Media Controls ---

# Volume control keys (Increases/decreases by 5%)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Screen brightness keys (Increases/decreases by 5%)
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
